<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Войти — ПриютДома</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
  <link rel="preconnect" href="https://shelterr-production.up.railway.app">
  <link rel="dns-prefetch" href="https://shelterr-production.up.railway.app">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/priyt/" class="navbar-brand">
    <div class="brand-icon">🐾</div>
    ПриютДома
  </a>
  <div class="navbar-actions">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    <a href="/priyt/" class="btn btn-ghost btn-sm">← На главную</a>
  </div>
</nav>

<div class="auth-bg"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🐾</div>
      <h1>ПриютДома</h1>
      <p style="color:var(--brown-mid);font-size:.9rem;margin-top:4px">Войди, чтобы помочь животным</p>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Войти</div>
      <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Регистрация</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="formLogin">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email <span class="required">*</span></label>
        <input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Пароль <span class="required">*</span></label>
        <div style="position:relative">
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          <button type="button" onclick="togglePwd('loginPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--brown-mid)">👁</button>
        </div>
      </div>
      <div id="loginError" style="color:var(--error);font-size:.85rem;margin-bottom:16px;display:none"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="handleLogin()">
        Войти в аккаунт
      </button>
      <div class="auth-divider">или</div>
      <div style="text-align:center;font-size:.85rem;color:var(--brown-mid)">
        Нет аккаунта? <a href="#" onclick="switchTab('register')" style="color:var(--terracotta);font-weight:600">Зарегистрируйся</a>
      </div>
      <div style="margin-top:20px;background:var(--cream-dark);border-radius:var(--radius-sm);padding:12px 16px;font-size:.8rem;color:var(--brown-mid)">
        <strong style="color:var(--brown)">💡 Демо:</strong> admin@shelter.ru / admin123
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="formRegister">
      <div class="form-group">
        <label class="form-label" for="regName">Имя <span class="required">*</span></label>
        <input type="text" class="form-control" id="regName" placeholder="Иван Петров" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">Email <span class="required">*</span></label>
        <input type="email" class="form-control" id="regEmail" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPhone">Телефон</label>
        <input type="tel" class="form-control" id="regPhone" placeholder="+7 (999) 123-45-67" autocomplete="tel">
      </div>
      <div class="form-group">
        <label class="form-label" for="regAddress">Адрес проживания</label>
        <input type="text" class="form-control" id="regAddress" placeholder="г. Москва, ул. Примерная, д. 1">
      </div>
      <div class="form-group">
        <label class="form-label" for="regHousing">Тип жилья</label>
        <select class="form-control" id="regHousing">
          <option value="">Не указано</option>
          <option value="apartment">Квартира</option>
          <option value="house">Частный дом</option>
          <option value="room">Комната</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" id="regOtherPets">
          <span>У меня уже есть другие животные</span>
        </label>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">Пароль <span class="required">*</span></label>
        <div style="position:relative">
          <input type="password" class="form-control" id="regPassword" placeholder="Минимум 6 символов" autocomplete="new-password">
          <button type="button" onclick="togglePwd('regPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--brown-mid)">👁</button>
        </div>
        <div id="pwdStrength" style="margin-top:6px;height:4px;border-radius:2px;background:var(--cream-dark);overflow:hidden">
          <div id="pwdStrengthBar" style="height:100%;width:0;transition:all .3s;border-radius:2px"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword2">Повтори пароль <span class="required">*</span></label>
        <input type="password" class="form-control" id="regPassword2" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" id="regAgree">
          <span>Я согласен с условиями использования и политикой конфиденциальности</span>
        </label>
      </div>
      <div id="regError" style="color:var(--error);font-size:.85rem;margin-bottom:16px;display:none"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="handleRegister()">
        Создать аккаунт
      </button>
      <div class="auth-divider">или</div>
      <div style="text-align:center;font-size:.85rem;color:var(--brown-mid)">
        Уже есть аккаунт? <a href="#" onclick="switchTab('login')" style="color:var(--terracotta);font-weight:600">Войди</a>
      </div>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    
    initTheme();

    // If already logged in, redirect
    if (getCurrentUser()) {
      window.location.href = "/priyt/";
      return;
    }

    // Check URL params for tab
    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'register') switchTab('register');

    // Password strength meter
    document.getElementById('regPassword')?.addEventListener('input', checkPwdStrength);
    document.getElementById('regPassword2')?.addEventListener('input', checkPwdMatch);
  });

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('formLogin').classList.toggle('active', tab === 'login');
    document.getElementById('formRegister').classList.toggle('active', tab === 'register');
  }

  function togglePwd(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  function checkPwdStrength() {
    const pwd = document.getElementById('regPassword').value;
    const bar = document.getElementById('pwdStrengthBar');
    if (!bar) return;

    let score = 0;
    if (pwd.length >= 6) score++;
    if (pwd.length >= 10) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;

    const colors = ['#D64040', '#D64040', '#D9892A', '#C9962A', '#4A9E6A', '#4A9E6A'];
    const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];

    bar.style.width = widths[score];
    bar.style.background = colors[score];
  }

  function checkPwdMatch() {
    const p1 = document.getElementById('regPassword').value;
    const p2 = document.getElementById('regPassword2').value;
    const field = document.getElementById('regPassword2');
    if (p2 && p1 !== p2) {
      field.style.borderColor = 'var(--error)';
    } else {
      field.style.borderColor = p2 ? 'var(--success)' : '';
    }
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');

    errorEl.style.display = 'none';

    if (!email || !password) {
      errorEl.textContent = 'Заполни все поля';
      errorEl.style.display = 'block';
      return;
    }

    try {
      const user = await loginUser(email, password);
      setCurrentUser(user);
      showToast('Добро пожаловать, ' + user.name + '! 🐾', 'success');

      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      const pet = params.get('pet');

      setTimeout(() => {
        if (redirect === 'adopt' && pet) {
          window.location.href = `/priyt/adopt?pet=${pet}`;
        } else {
          window.location.href = "/priyt/";
        }
      }, 800);
    } catch (e) {
      errorEl.textContent = e.message;
      errorEl.style.display = 'block';
    }
  }

  async function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    const password2 = document.getElementById('regPassword2').value;
    const agree = document.getElementById('regAgree').checked;
    const errorEl = document.getElementById('regError');

    errorEl.style.display = 'none';

    if (!name || !email || !password) {
      errorEl.textContent = 'Заполни все обязательные поля';
      errorEl.style.display = 'block';
      return;
    }

    if (!validateEmail(email)) {
      errorEl.textContent = 'Введи корректный email';
      errorEl.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = 'Пароль должен быть не менее 6 символов';
      errorEl.style.display = 'block';
      return;
    }

    if (password !== password2) {
      errorEl.textContent = 'Пароли не совпадают';
      errorEl.style.display = 'block';
      return;
    }

    if (!agree) {
      errorEl.textContent = 'Необходимо принять условия использования';
      errorEl.style.display = 'block';
      return;
    }

    try {
      const user = await registerUser({
        name, email, password, phone,
        address: document.getElementById('regAddress').value.trim(),
        housingType: document.getElementById('regHousing').value,
        hasOtherPets: document.getElementById('regOtherPets').checked,
      });
      setCurrentUser(user);
      showToast('Аккаунт создан! Добро пожаловать, ' + name + '! 🎉', 'success');
      setTimeout(() => { window.location.href = "/priyt/"; }, 1000);
    } catch (e) {
      errorEl.textContent = e.message;
      errorEl.style.display = 'block';
    }
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('formLogin').classList.contains('active')) handleLogin();
      else handleRegister();
    }
  });
</script>
</body>
</html>
